<body>
    <div class="container text-center my-5">
        <h1>Virtual Piano</h1>
        <p>Press the following keys to play the notes:</p>

        <div id="piano" class="row">
            <!-- Piano keys with IDs for JavaScript interaction -->
                <div class="col">
                    <div class="row keyHotkey"><span class="note-label"><strong>A</strong></span></div>
                    <div id="keyC" class="row key d-flex flex-column justify-content-end pb-2"><span class="note-label">C</span></div>
                </div>

                <div class="col">
                    <!--<div class="row keyHotkey"><span class="note-label"><strong>A</strong></span></div>-->
                    <div id="keyC" class="row key blackKey justify-content-end pb-2"><span class="note-label">C</span></div>
                </div>
                
                <div class="col">
                    <div class="row keyHotkey"><span class="note-label"><strong>S</strong></span></div>
                    <div id="keyD" class="row key d-flex flex-column justify-content-end pb-2"><span class="note-label">D</span></div>
                </div>
                <div class="col">
                    <div class="row keyHotkey"><span class="note-label"><strong>D</strong></span></div>
                    <div id="keyE" class="row key d-flex flex-column justify-content-end pb-2"><span class="note-label">E</span></div>
                </div>
                <div class="col">
                    <div class="row keyHotkey"><span class="note-label"><strong>F</strong></span></div>
                    <div id="keyF" class="row key d-flex flex-column justify-content-end pb-2"><span class="note-label">F</span></div>
                </div>
                <div class="col">
                    <div class="row keyHotkey"><span class="note-label"><strong>G</strong></span></div>
                    <div id="keyG" class="row key d-flex flex-column justify-content-end pb-2"><span class="note-label">G</span></div>
                </div>
                <div class="col">
                    <div class="row keyHotkey"><span class="note-label"><strong>H</strong></span></div>
                    <div id="keyA" class="row key d-flex flex-column justify-content-end pb-2"><span class="note-label">A</span></div>
                </div>
                <div class="col">
                    <div class="row keyHotkey"><span class="note-label"><strong>J</strong></span></div>
                    <div id="keyB" class="row key d-flex flex-column justify-content-end pb-2"><span class="note-label">B</span></div>
                </div>
                
            
                <!--
                <div id="keyC" class="col key d-flex flex-column justify-content-end pb-2">

                -->
                
        </div>
    </div>
    <script>
        document.addEventListener("keydown", function(event) {
        if (event.key === "a") {
            playNote("C");
        } else if (event.key === "s") {
            playNote("D");
        } else if (event.key === "d") {
            playNote("E");
        } else if (event.key === "f") {
            playNote("F");
        } else if (event.key === "g") {
            playNote("G");
        } else if (event.key === "h") {
            playNote("A");
        } else if (event.key === "j") {
            playNote("B");
        }
        });

        switch (event.key) {
            case "a":
                playNote("C");
                break;
            case "s":
                playNote("D");
                break;
            case "d":
                playNote("E");
                break;
            case "f":
                playNote("F");
                break;
            case "g":
                playNote("G");
                break;
            case "h":
                playNote("A");
                break;
            case "j":
                playNote("B");
                break;
        }
        
        document.getElementById("keyC").addEventListener("click", function() {
        playNote("C");
        });
        document.getElementById("keyD").addEventListener("click", function() {
        playNote("D");
        });
        document.getElementById("keyE").addEventListener("click", function() {
        playNote("E");
        });
        document.getElementById("keyF").addEventListener("click", function() {
        playNote("F");
        });
        document.getElementById("keyG").addEventListener("click", function() {
        playNote("G");
        });
        document.getElementById("keyA").addEventListener("click", function() {
        playNote("A");
        });
        document.getElementById("keyB").addEventListener("click", function() {
        playNote("B");
        });

        function playNote(note) {
            const keyElement = document.getElementById("key" + note);
            keyElement.classList.add('pressed');
            setTimeout(() => {
                keyElement.classList.remove('pressed');
            }, 250);
            console.log("Playing note: " + note);
            playSound(note);
        }
        function playSound(note) {
            const audio = new Audio("/Lecture02/Exercise/templateExercise2/sounds/" + note.toUpperCase() + ".mp3");
            audio.play();
        }
    </script>
</body>
