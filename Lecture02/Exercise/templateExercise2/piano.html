<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Piano</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container text-center my-5">
        <h1>Virtual Piano</h1>
        <p>Press the following keys to play the notes:</p>

        <div class="key-list">
            <h5>White Keys:</h5>
            <ul class="list-inline">
                <li class="list-inline-item"><strong>A</strong> - C</li>
                <li class="list-inline-item"><strong>S</strong> - D</li>
                <li class="list-inline-item"><strong>D</strong> - E</li>
                <li class="list-inline-item"><strong>F</strong> - F</li>
                <li class="list-inline-item"><strong>G</strong> - G</li>
                <li class="list-inline-item"><strong>H</strong> - A</li>
                <li class="list-inline-item"><strong>J</strong> - B</li>
            </ul>
        </div>

        <div class="key-list">
            <h5>Black Keys:</h5>
            <ul class="list-inline">
                <li class="list-inline-item"><strong>W</strong> - C#</li>
                <li class="list-inline-item"><strong>E</strong> - D#</li>
                <li class="list-inline-item"><strong>T</strong> - F#</li>
                <li class="list-inline-item"><strong>Z</strong> - G#</li>
                <li class="list-inline-item"><strong>U</strong> - A#</li>
            </ul>
        </div>


        <div class="d-flex justify-content-center">
            <div class="piano">

                <!-- white keys -->
                <div class="key white" data-note="c" id="keyC">C</div>
                <div class="key white" data-note="d" id="keyD">D</div>
                <div class="key white" data-note="e" id="keyE">E</div>
                <div class="key white" data-note="f" id="keyF">F</div>
                <div class="key white" data-note="g" id="keyG">G</div>
                <div class="key white" data-note="a" id="keyA">A</div>
                <div class="key white" data-note="b" id="keyB">B</div>

                <!-- black keys -->
                <div class="key black" data-note="C#" id="keyCsharp">C#</div>
                <div class="key black" data-note="D#" id="keyDsharp">D#</div>
                <div class="key black" data-note="F#" id="keyFsharp">F#</div>
                <div class="key black" data-note="G#" id="keyGsharp">G#</div>
                <div class="key black" data-note="A#" id="keyAsharp">A#</div>
            </div>


        </div>



    </div>
    <script>
        const keyMap = {
            "a": "C",
            "s": "D",
            "d": "E",
            "f": "F",
            "g": "G",
            "h": "A",
            "j": "B",
            "w": "C#",
            "e": "D#",
            "t": "F#",
            "z": "G#",
            "u": "A#"
        };

        const noteToFile = {
            "C": "C.mp3",
            "D": "D.mp3",
            "E": "E.mp3",
            "F": "F.mp3",
            "G": "G.mp3",
            "A": "A.mp3",
            "B": "B.mp3",
            "C#": "C5.mp3",
            "D#": "D5.mp3",
            "F#": "F5.mp3",
            "G#": "G5.mp3",
            "A#": "A4.mp3"
        };


        document.addEventListener("keydown", function (event) {
            const key = event.key.toLowerCase();
            if (keyMap[key]) {
                playNote(keyMap[key]);
            }
        });


        function playNote(note) {
            let elementId = "key" + note.replace("#", "sharp");
            const keyElement = document.getElementById(elementId);

            if (keyElement) {
                keyElement.classList.add('pressed');

                setTimeout(() => {
                    keyElement.classList.remove('pressed');
                }, 250);

                playSound(note);
            }
        }

        function playSound(note) {
            const fileName = noteToFile[note];
            if (!fileName) {
                console.error("No audio file mapped for note:", note);
                return;
            }
            const audio = new Audio("./sounds/" + fileName);
            //const audio = new Audio("/Lecture02/Exercise/templateExercise2/sounds/" + fileName);
            audio.play();
        }


        document.querySelectorAll(".key").forEach(key => {
            key.addEventListener("click", function () {

                let note = this.dataset.note;

                playNote(note.toUpperCase());
            });
        });


    </script>
</body>

</html>
